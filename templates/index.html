<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI ✨</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #343541; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 760px; height: 100vh; background: #343541; display: flex; flex-direction: column; }
        .chat-header { background: #202123; color: #ececec; padding: 16px 20px; text-align: center; font-size: 1rem; font-weight: 600; letter-spacing: 0.5px; border-bottom: 1px solid #444; }
        .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .message-wrapper { padding: 20px 24px; display: flex; gap: 16px; align-items: flex-start; }
        .message-wrapper.user { background: #343541; }
        .message-wrapper.bot { background: #444654; }
        .avatar { width: 36px; height: 36px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
        .avatar.user { background: #19c37d; }
        .avatar.bot { background: #9b59b6; }
        .message-text { color: #ececec; font-size: 0.95rem; line-height: 1.7; padding-top: 6px; }
        .chat-input-area { background: #343541; padding: 16px 24px 24px; }
        .input-wrapper { display: flex; align-items: center; background: #40414f; border: 1px solid #555; border-radius: 12px; padding: 12px 16px; gap: 10px; }
        .input-wrapper input { flex: 1; background: transparent; border: none; outline: none; color: #ececec; font-size: 0.95rem; }
        .input-wrapper input::placeholder { color: #8e8ea0; }
        .input-wrapper button { background: #19c37d; border: none; color: white; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
        .input-wrapper button:hover { background: #1aab6d; }
        .footer-text { text-align: center; color: #8e8ea0; font-size: 0.75rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">Aura AI ✨</div>
        <div class="chat-messages" id="chat-messages">
            <div class="message-wrapper bot">
                <div class="avatar bot">🤖</div>
                <div class="message-text">Hi! I'm Aura AI, your intelligent assistant. How can I help you today? ✨</div>
            </div>
        </div>
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Send a message..." />
                <button onclick="sendMessage()">➤</button>
            </div>
            <div class="footer-text">AI Chatbot may produce inaccurate information.</div>
        </div>
    </div>

    <script>
        const input = document.getElementById("user-input");
        const messages = document.getElementById("chat-messages");

        input.addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });

        async function sendMessage() {
            const userText = input.value.trim();
            if (!userText) return;

            appendMessage(userText, "user", "👤");
            input.value = "";

            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: userText })
            });

            const data = await response.json();
            appendMessage(data.response, "bot", "🤖");
        }

        function appendMessage(text, type, emoji) {
            const wrapper = document.createElement("div");
            wrapper.classList.add("message-wrapper", type);

            const avatar = document.createElement("div");
            avatar.classList.add("avatar", type);
            avatar.textContent = emoji;

            const messageText = document.createElement("div");
            messageText.classList.add("message-text");
            messageText.textContent = text;

            wrapper.appendChild(avatar);
            wrapper.appendChild(messageText);
            messages.appendChild(wrapper);
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
